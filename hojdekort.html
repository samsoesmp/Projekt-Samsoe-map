function mcToLatLng(mcX, mcZ) {
  const tx = (mcX - MC_X_MIN) / (MC_X_MAX - MC_X_MIN);
  const tz = (mcZ - MC_Z_MIN) / (MC_Z_MAX - MC_Z_MIN);
  return [GEO.south + tx*(GEO.north-GEO.south), GEO.west + tz*(GEO.east-GEO.west)];
}

function elevColor(m) {
  const stops = [
    [0,  [26,58,107]], [8,[30,100,130]], [15,[45,140,58]],
    [25, [138,181,32]], [38,[232,192,32]], [50,[220,120,20]], [65,[200,32,20]]
  ];
  let lo = stops[0], hi = stops[stops.length-1];
  for (let i=0; i<stops.length-1; i++) {
    if (m >= stops[i][0] && m <= stops[i+1][0]) { lo=stops[i]; hi=stops[i+1]; break; }
  }
  const t = Math.max(0, Math.min(1,(m-lo[0])/(hi[0]-lo[0]||1)));
  const r = Math.round(lo[1][0]+t*(hi[1][0]-lo[1][0]));
  const g = Math.round(lo[1][1]+t*(hi[1][1]-lo[1][1]));
  const b = Math.round(lo[1][2]+t*(hi[1][2]-lo[1][2]));
  return `rgba(${r},${g},${b},0.75)`;
}

const map = L.map('map', { center: [55.88, 10.61], zoom: 11 });

// Satellite layer — correct Leaflet template syntax
const satLayer = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { attribution: 'Tiles &copy; Esri', maxZoom: 17 }
);
satLayer.addTo(map);

let showHeight = true;
const rectangles = {};
const tooltip = document.getElementById('tooltip');

function cellKey(col, row) { return `${col},${row}`; }

function drawGrid() {
  for (let col = 0; col < COLS; col++) {
    for (let row = 0; row < ROWS; row++) {
      const mcX0 = MC_X_MIN + col * CELL;
      const mcZ0 = MC_Z_MIN + row * CELL;
      const sw = mcToLatLng(mcX0, mcZ0 + CELL);
      const ne = mcToLatLng(mcX0 + CELL, mcZ0);
      const key = cellKey(col, row);
      const elev = ELEV[key] ?? 0;
      const rect = L.rectangle([sw, ne], {
        color: 'rgba(255,255,255,0.15)',
        weight: 0.5,
        fillColor: showHeight ? elevColor(elev) : 'transparent',
        fillOpacity: showHeight ? 1 : 0
      }).addTo(map);

      rect.on('mousemove', (e) => {
        const elev = ELEV[key] ?? 0;
        const y = SEA_Y + elev;
        tooltip.style.display = 'block';
        tooltip.style.left = (e.originalEvent.clientX + 16) + 'px';
        tooltip.style.top  = (e.originalEvent.clientY - 10) + 'px';
        tooltip.innerHTML = `<b>Celle (${col}, ${row})</b><br>Højde: ${elev} m over hav<br>In-game Y ≈ ${y}`;
      });
      rect.on('mouseout', () => { tooltip.style.display = 'none'; });
      rect.on('click', () => openModal(col, row));
      rectangles[key] = rect;
    }
  }
}

function refreshColors() {
  for (const key in rectangles) {
    const elev = ELEV[key] ?? 0;
    rectangles[key].setStyle({
      fillColor: showHeight ? elevColor(elev) : 'transparent',
      fillOpacity: showHeight ? 1 : 0
    });
  }
}

function setMode(height, sat) {
  showHeight = height;
  if (sat) satLayer.addTo(map); else map.removeLayer(satLayer);
  refreshColors();
}

document.getElementById('btn-height').addEventListener('click', () => {
  setMode(true, false);
  document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-height').classList.add('active');
});
document.getElementById('btn-satellite').addEventListener('click', () => {
  setMode(false, true);
  document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-satellite').classList.add('active');
});
document.getElementById('btn-both').addEventListener('click', () => {
  setMode(true, true);
  document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-both').classList.add('active');
});

function openModal(col, row) {
  const key = cellKey(col, row);
  const elev = ELEV[key] ?? 0;
  const mcX0 = MC_X_MIN + col * CELL;
  const mcZ0 = MC_Z_MIN + row * CELL;
  document.getElementById('modal-title').textContent = `Celle (${col}, ${row})`;
  document.getElementById('modal-stats').innerHTML = `
    <div class="stat"><span>Højde over hav</span><span>${elev} m</span></div>
    <div class="stat"><span>Havniveau Y</span><span>Y = ${SEA_Y}</span></div>
    <div class="stat"><span>Terræn Y (top)</span><span>Y ≈ ${SEA_Y + elev}</span></div>
    <div class="stat"><span>Byg fra Y</span><span>Y = ${SEA_Y + elev + 1}</span></div>
    <div class="stat"><span>MC X-interval</span><span>${mcX0} → ${mcX0+CELL}</span></div>
    <div class="stat"><span>MC Z-interval</span><span>${mcZ0} → ${mcZ0+CELL}</span></div>
  `;
  document.getElementById('modal-bg').classList.add('open');
}

document.getElementById('close-modal').addEventListener('click', () =>
  document.getElementById('modal-bg').classList.remove('open'));
document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg'))
    document.getElementById('modal-bg').classList.remove('open');
});

drawGrid();
</script>
</body>
</html>
